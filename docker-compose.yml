version: '3.8'

services:
  # ─── RateShield Application ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rateshield-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://rateshield:rateshield_pass@postgres:5432/rateshield_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - ADMIN_API_KEY=${ADMIN_API_KEY:-rs_admin_default_key_2026}
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rateshield-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rateshield-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rateshield
      - POSTGRES_PASSWORD=rateshield_pass
      - POSTGRES_DB=rateshield_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - rateshield-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rateshield -d rateshield_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis Cache ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rateshield-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - rateshield-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  rateshield-network:
    driver: bridge
