<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f2942" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a5281f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>

  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f2942">Concurrency Safety: Same Client Key, Two Simultaneous Requests</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#4a5568">Why RateShield can't lose or double-spend a token — the Lua script is the whole answer</text>

  <!-- Lifeline headers -->
  <g font-size="12.5" font-weight="700" fill="#ffffff">
    <rect x="60"  y="80" width="190" height="40" rx="8" fill="#0f2942"/>
    <text x="155" y="105" text-anchor="middle">Request A</text>

    <rect x="290" y="80" width="190" height="40" rx="8" fill="#0f2942"/>
    <text x="385" y="105" text-anchor="middle">Request B</text>

    <rect x="530" y="80" width="230" height="40" rx="8" fill="#1e6fd9"/>
    <text x="645" y="105" text-anchor="middle">RateShield Service</text>

    <rect x="810" y="80" width="330" height="40" rx="8" fill="#a5281f"/>
    <text x="975" y="105" text-anchor="middle">Redis (single-threaded exec)</text>
  </g>

  <!-- lifelines -->
  <line x1="155" y1="120" x2="155" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="385" y1="120" x2="385" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="645" y1="120" x2="645" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="975" y1="120" x2="975" y2="700" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Both requests arrive at almost the same instant -->
  <line x1="155" y1="150" x2="645" y2="150" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="400" y="143" text-anchor="middle" font-size="10.5" fill="#4a5568">POST /api/v1/check  (t = 0.000s)</text>

  <line x1="385" y1="168" x2="645" y2="168" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="400" y="182" text-anchor="middle" font-size="10.5" fill="#4a5568">POST /api/v1/check  (t = 0.001s — nearly simultaneous)</text>

  <text x="645" y="212" text-anchor="middle" font-size="11" font-style="italic" fill="#1e6fd9">Both hit the same Token Bucket service for clientId = "abc123"</text>

  <!-- Service forwards both EVAL calls to Redis -->
  <line x1="645" y1="234" x2="975" y2="234" stroke="#1e6fd9" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="810" y="227" text-anchor="middle" font-size="10" fill="#1e6fd9">EVAL tokenBucket.lua (Request A)</text>

  <line x1="645" y1="252" x2="975" y2="252" stroke="#1e6fd9" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="810" y="266" text-anchor="middle" font-size="10" fill="#1e6fd9">EVAL tokenBucket.lua (Request B)</text>

  <!-- Redis queue box -->
  <rect x="895" y="288" width="220" height="44" rx="8" fill="#fdecec" stroke="#e39a94" stroke-width="1.3"/>
  <text x="1005" y="306" text-anchor="middle" font-size="10.5" font-weight="700" fill="#a5281f">Both EVALs queue up —</text>
  <text x="1005" y="321" text-anchor="middle" font-size="10.5" font-weight="700" fill="#a5281f">Redis runs one at a time</text>

  <!-- Activation bar: Script A executes fully -->
  <rect x="965" y="352" width="20" height="120" rx="4" fill="#a5281f" filter="url(#shadow2)"/>
  <text x="998" y="366" font-size="10.5" font-weight="700" fill="#a5281f">Script A executes — atomic block</text>
  <g font-size="9.5" fill="#5c2622">
    <text x="998" y="384">1. HGET bucket:abc123 → tokens = 1</text>
    <text x="998" y="400">2. compute lazy refill (elapsed × rate)</text>
    <text x="998" y="416">3. tokens ≥ 1 → subtract 1 → tokens = 0</text>
    <text x="998" y="432">4. HSET bucket:abc123 tokens = 0</text>
    <text x="998" y="448">5. return ALLOW, remaining = 0</text>
  </g>
  <text x="700" y="480" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">← nothing else can touch this key while Script A is mid-execution →</text>

  <!-- Response A -->
  <line x1="975" y1="482" x2="645" y2="482" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="810" y="475" text-anchor="middle" font-size="10">{ allowed: true, remaining: 0 }</text>
  <line x1="645" y1="500" x2="155" y2="500" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="400" y="493" text-anchor="middle" font-size="10.5" fill="#0f7a4c" font-weight="700">200 OK — Request A: ALLOWED (last token)</text>

  <!-- Activation bar: Script B executes only after A finishes -->
  <rect x="965" y="524" width="20" height="104" rx="4" fill="#a5281f" filter="url(#shadow2)"/>
  <text x="998" y="538" font-size="10.5" font-weight="700" fill="#a5281f">Script B executes — atomic block</text>
  <g font-size="9.5" fill="#5c2622">
    <text x="998" y="556">1. HGET bucket:abc123 → tokens = 0</text>
    <text x="998" y="572">2. compute lazy refill (≈0 elapsed)</text>
    <text x="998" y="588">3. tokens &lt; 1 → DENY, no decrement</text>
    <text x="998" y="604">4. return DENY, retry-after ≈ 0.1s</text>
  </g>

  <!-- Response B -->
  <line x1="975" y1="640" x2="645" y2="640" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="810" y="633" text-anchor="middle" font-size="10">{ allowed: false, retryAfter: 0.1 }</text>
  <line x1="645" y1="658" x2="385" y2="658" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="400" y="651" text-anchor="middle" font-size="10.5" fill="#a5281f" font-weight="700">429 — Request B: DENIED (correctly)</text>

  <text x="600" y="690" text-anchor="middle" font-size="11" fill="#0f2942" font-weight="600">Result: exactly one token spent, exactly once. Without the Lua script, both could read "1 token" and both would be ALLOWED.</text>
  <text x="600" y="715" text-anchor="middle" font-size="9.5" fill="#94a3b8">RateShield · github.com/abhishekmishra28/RateShield</text>
</svg>
